<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">

      <h3 class="text-center mb-4">Iniciar sesión</h3>

      <form id="loginForm">

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="ejemplo@email.com" required>
        </div>


        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="********" required>
        </div>


        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label">Recordarme</label>
        </div>


        <button type="submit" class="btn btn-primary w-100">
          Entrar
        </button>

        <div class="text-center my-3">
          <small class="text-muted">o</small>
        </div>


        <button type="button" class="btn btn-outline-danger w-100">
          Iniciar con Google
        </button>


        <div class="text-center mt-3">
          <small>¿No tienes cuenta? <a href="#">Regístrate</a></small>
        </div>

      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      console.log("Email:", email);
      console.log("Password:", password);

      alert("Login enviado (aquí conectarías con tu backend)");
    });
  </script>

</body>

</html>
