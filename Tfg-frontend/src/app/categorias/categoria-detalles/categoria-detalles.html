<div class="min-h-screen bg-gray-50">

  <!-- Navbar -->
  <nav class="sticky top-0 bg-white shadow py-3 z-50">
    <div class="container mx-auto px-4 flex items-center justify-between">
      <a routerLink="/" class="flex items-center space-x-3 hover:opacity-90 transition">
        <span class="bg-blue-600 text-white text-2xl font-bold px-3 py-2 rounded">R</span>
        <span class="font-bold text-lg text-black">Reviewmeter</span>
      </a>
      <div class="flex items-center space-x-3">
        <ng-container *ngIf="estaLogueado(); else loginBtn">
          <button routerLink="/profile"
            class="border border-blue-600 text-blue-600 px-4 py-2 rounded-full flex items-center gap-2 hover:bg-blue-50 transition">
            <i class="bi bi-person-circle"></i> Perfil
          </button>
          <button (click)="logout()"
            class="bg-red-500 text-white px-4 py-2 rounded-full flex items-center gap-2 hover:bg-red-600 transition">
            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
          </button>
        </ng-container>
        <ng-template #loginBtn>
          <button routerLink="/login"
            class="bg-blue-600 text-white px-4 py-2 rounded-full flex items-center gap-2 hover:bg-blue-700 transition">
            <i class="bi bi-person"></i> Iniciar sesión
          </button>
        </ng-template>
      </div>
    </div>
  </nav>

  <!-- Header de categoría -->
  <header class="bg-blue-600 text-white py-12">
    <div class="container mx-auto px-4">
      <div class="flex items-center gap-2 text-blue-200 text-sm mb-3">
        <a routerLink="/" class="hover:text-white transition text-white">Inicio</a>
        <span>›</span>
        <a routerLink="/categorias" class="hover:text-white transition text-white">Categorías</a>
        <span>›</span>
        <span class="text-white font-medium">{{ categoriaNombre }}</span>
      </div>
      <h1 class="text-4xl font-extrabold">{{ categoriaNombre }}</h1>
      <p class="mt-2 text-blue-100">{{ productos.length }} productos encontrados</p>
    </div>
  </header>

  <!-- Grid de productos -->
  <main class="container mx-auto px-4 py-10">

    <!-- Sin productos -->
    <div *ngIf="productos.length === 0"
         class="text-center py-24 bg-white rounded-2xl border-2 border-dashed border-gray-200">
      <p class="text-gray-400 text-lg">No hay productos en esta categoría todavía.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div *ngFor="let p of productos"
           class="group bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300">

        <!-- Imagen -->
        <div class="relative h-48 bg-gray-50 flex items-center justify-center overflow-hidden">
          <img [src]="p.imageUrl" [alt]="p.nombre"
               class="h-full w-full object-contain p-4 transition-transform duration-300 group-hover:scale-105">
          <span class="absolute top-3 left-3 bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded-full uppercase">
            {{ p.marca }}
          </span>
        </div>

        <!-- Info -->
        <div class="p-5">
          <h3 class="font-bold text-gray-900 text-base leading-snug mb-1 line-clamp-2">{{ p.nombre }}</h3>
          <p class="text-gray-500 text-sm line-clamp-2 mb-3">{{ p.descripcion }}</p>

          <!-- Valoración -->
          <div class="flex items-center gap-1 mb-4">
            <span *ngFor="let star of getEstrellas(p.valoracion)"
                  [class]="star === 1 ? 'text-yellow-400' : 'text-gray-300'"
                  class="text-lg">★</span>
            <span class="text-xs text-gray-400 ml-1">({{ p.valoracion | number:'1.1-1' }})</span>
          </div>

          <button [routerLink]="['/producto', p.idProducto]"
            class="w-full bg-blue-600 text-white py-2 rounded-xl font-semibold hover:bg-blue-700 transition text-sm">
            Ver producto
          </button>
        </div>

      </div>
    </div>
  </main>

</div>
