<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-purple-600 p-4">
  <div class="bg-white shadow-xl rounded-2xl p-6 sm:p-8 w-full max-w-sm">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="flex items-center gap-2">
        <span class="bg-blue-600 text-white text-xl font-bold px-2.5 py-1.5 rounded">R</span>
        <span class="font-bold text-lg text-gray-800">Reviewmeter</span>
      </div>
    </div>

    <h3 class="text-xl font-bold text-center mb-6 text-gray-800">Iniciar sesión</h3>

    <form (ngSubmit)="login()" #form="ngForm" class="space-y-4">

      <div>
        <label class="block mb-1 text-gray-700 font-medium text-sm">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="tu@email.com"
        />
      </div>

      <div>
        <label class="block mb-1 text-gray-700 font-medium text-sm">Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="form.invalid"
        class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-semibold hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition text-sm"
      >
        Entrar
      </button>

      <div class="text-center text-gray-600 text-sm">
        ¿No tienes cuenta?
        <a routerLink="/register" class="text-blue-600 hover:underline font-medium">Crear cuenta</a>
      </div>

      <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 text-center">
        {{ error }}
      </div>

    </form>
  </div>
</div>
