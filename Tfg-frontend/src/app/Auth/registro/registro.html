<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-purple-600 p-4">
  <div class="bg-white shadow-xl rounded-2xl p-6 sm:p-8 w-full max-w-sm">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="flex items-center gap-2">
        <span class="bg-blue-600 text-white text-xl font-bold px-2.5 py-1.5 rounded">R</span>
        <span class="font-bold text-lg text-gray-800">Reviewmeter</span>
      </div>
    </div>

    <!-- ── Pantalla de éxito ── -->
    <div *ngIf="exito" class="text-center py-4">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h3 class="text-xl font-bold text-gray-800 mb-2">¡Revisa tu email!</h3>
      <p class="text-gray-500 text-sm mb-6">
        Te hemos enviado un enlace de verificación. Haz clic en él para activar tu cuenta.
      </p>
      <a routerLink="/login"
         class="inline-block w-full bg-blue-600 text-white py-2.5 rounded-xl font-semibold hover:bg-blue-700 transition text-sm text-center">
        Ir al inicio de sesión
      </a>
    </div>

    <!-- ── Formulario de registro ── -->
    <ng-container *ngIf="!exito">
      <h3 class="text-xl font-bold text-center mb-6 text-gray-800">Crear cuenta</h3>

      <form (ngSubmit)="registrar()" #form="ngForm" class="space-y-4">

        <div>
          <label class="block mb-1 text-gray-700 font-medium text-sm">Nombre</label>
          <input
            type="text"
            name="nombre"
            [(ngModel)]="nombre"
            required
            minlength="2"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Tu nombre"
          />
        </div>

        <div>
          <label class="block mb-1 text-gray-700 font-medium text-sm">Email</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="tu@email.com"
          />
        </div>

        <div>
          <label class="block mb-1 text-gray-700 font-medium text-sm">Contraseña</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            minlength="6"
            class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Mínimo 6 caracteres"
          />
        </div>

        <!-- Error -->
        <div *ngIf="error"
             class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 text-center">
          {{ error }}
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || cargando"
          class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-semibold hover:bg-blue-700
                 disabled:opacity-50 disabled:cursor-not-allowed transition text-sm flex items-center justify-center gap-2">
          <svg *ngIf="cargando" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          {{ cargando ? 'Registrando...' : 'Crear cuenta' }}
        </button>

        <div class="text-center text-gray-600 text-sm">
          ¿Ya tienes cuenta?
          <a routerLink="/login" class="text-blue-600 hover:underline font-medium">Iniciar sesión</a>
        </div>

      </form>
    </ng-container>

  </div>
</div>
