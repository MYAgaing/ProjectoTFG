spring.application.name=Reviewmerter

# Railway inyecta estas variables directamente — Spring Boot las lee automáticamente
# Fallback a valores locales para desarrollo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jpa}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nicolas}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto dinámico de Railway
server.port=${PORT:8080}
