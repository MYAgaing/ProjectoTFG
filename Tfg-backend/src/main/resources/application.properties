spring.application.name=Reviewmerter

# Railway inyecta estas variables directamente — Spring Boot las lee automáticamente
# Fallback a valores locales para desarrollo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jpa}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nicolas}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto dinámico de Railway
server.port=${PORT:8080}

# ── SMTP (configurar en Railway como variables de entorno) ────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:nicolas.adones8@gmail.com}
spring.mail.password=${MAIL_PASSWORD:dbruzkhyhemznfwe}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# URL base de la app (para construir el enlace de verificación)
app.frontend-url=${FRONTEND_URL:http://localhost:4200}
