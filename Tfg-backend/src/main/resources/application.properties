spring.application.name=Reviewmerter

# Railway inyecta estas variables directamente — Spring Boot las lee automáticamente
# Fallback a valores locales para desarrollo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://zephyr.proxy.rlwy.net:21764/railway}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gHSjviWFsqvUGNDeytUVBVuoqUWtzctz}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto dinámico de Railway
server.port=${PORT:8080}

# ── Resend API ─────────────────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY:re_YGFN3Jn6_DjY1884ZyiPffAVcgskbPFAc}
resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# URL base de la app (para construir el enlace de verificación)
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# URL del backend (para construir URLs de imágenes)
app.backend-url=${BACKEND_URL:http://localhost:8080}

# Directorio de almacenamiento de archivos
file.upload-dir=${UPLOAD_DIR:uploads/productos}

# Configuración de tamaño máximo de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.reviewmeter.tfg=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
