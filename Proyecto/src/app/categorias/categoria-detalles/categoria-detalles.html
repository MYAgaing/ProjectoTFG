<section class="min-h-screen bg-gradient-to-br from-blue-950 via-blue-900 to-blue-800 text-white py-10">
  <div class="container mx-auto px-4">

    <h1 class="text-3xl font-bold mb-8">
      {{ categoriaNombre }}
    </h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">

      <div *ngFor="let p of productos"
           class="bg-blue-800/50 rounded-xl overflow-hidden shadow hover:scale-105 transition">

        <div class="p-4">
          <h6 class="text-lg font-bold">{{ p.nombre }}</h6>

          <p class="text-gray-300 text-sm mt-2">
            {{ p.descripcion }}
          </p>

          <div class="mt-3 flex justify-between items-center">
            <span class="font-bold">{{ p.nombre }}€</span>
            <span class="font-bold">{{ p.descripcion }}</span>
          </div>

          <button
            [routerLink]="['/producto', p.idProducto]"
            class="mt-4 w-full bg-blue-500 hover:bg-blue-400 py-2 rounded-lg">
            Ver producto
          </button>

        </div>
      </div>

    </div>

  </div>
</section>
