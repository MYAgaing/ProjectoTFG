<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReviewHub | Reviewmeter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-white bg-blue-500">

  <!-- NAVBAR -->
  <nav class="bg-blue-950/80 backdrop-blur-lg shadow sticky top-0 z-50">
    <div class="container mx-auto flex items-center justify-between p-4">
      <a href="#" class="flex items-center text-white font-bold text-xl">
        <span class="bg-blue-500 text-white rounded-full px-3 py-1 mr-3 text-2xl">R</span>
        Reviewmeter
      </a>
      <div class="flex items-center gap-3">
        <a href="#categories" class="text-white hover:text-blue-200 transition">Categorías</a>
        <button routerLink="/login"
          class="px-4 py-2 border border-white text-white rounded-full hover:bg-white hover:text-blue-950 transition">
          <i class="bi bi-person"></i> Iniciar sesión
        </button>
      </div>
    </div>
  </nav>

  <!-- CATEGORÍAS -->
  <section class="py-16">
    <div class="container mx-auto">
      <h3 class="text-3xl font-bold mb-8 text-center">Categorías</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <a *ngFor="let c of categorias"
         [routerLink]="['/categoria', c.idCategoria, c.nombre]"class="block bg-blue-800/70 backdrop-blur-md shadow rounded-lg overflow-hidden hover:scale-105 transition-transform">
          <img src="" class="w-full h-40 object-cover">
          <div class="p-3 text-center">
            <h6 class="text-white font-bold">{{ c.nombre }}</h6>
          </div>
        </a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="bg-blue-950 text-blue-200 py-6 mt-10 text-center">
    © 2026 Reviewmeter. Todos los derechos reservados.
  </footer>

</body>

</html>
