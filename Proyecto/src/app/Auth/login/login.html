<div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-600 to-purple-600 p-4">
  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-sm">

    <h3 class="text-2xl font-bold text-center mb-6 text-gray-800">Iniciar sesión</h3>

    <form (ngSubmit)="login()" #form="ngForm" class="space-y-4">

      <!-- Email -->
      <div>
        <label class="block mb-1 text-gray-700 font-medium">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="tu@email.com"
        />
      </div>

      <!-- Contraseña -->
      <div>
        <label class="block mb-1 text-gray-700 font-medium">Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="••••••••"
        />
      </div>

      <!-- Botón Entrar -->
      <button
        type="submit"
        [disabled]="form.invalid"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition"
      >
        Entrar
      </button>

      <!-- Crear cuenta -->
      <div class="text-center text-gray-600 text-sm">
        ¿No tienes cuenta? 
        <a routerLink="/register" class="text-blue-600 hover:underline">Crear cuenta</a>
      </div>

      <!-- Error -->
      <div *ngIf="error" class="mt-2 text-center text-red-600 font-medium">
        {{ error }}
      </div>

    </form>
  </div>
</div>
